<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #2DD4BF;
      --color-primary-container:    #134E4A;
      --color-on-primary:           #042F2E;
      /* === 背景 / 表面 === */
      --color-background:                 #0F172A;
      --color-surface-container-lowest:   #1E293B;
      --color-surface:                    #1E293B;
      --color-surface-container:          #334155;
      --color-surface-container-high:     #475569;
      --color-surface-container-highest:  #64748B;
      /* === 文字 === */
      --color-on-surface:           #F1F5F9;
      --color-on-surface-variant:   #94A3B8;
      /* === 功能色 === */
      --color-success:  #34D399;
      --color-error:    #F87171;
      --color-warning:  #FBBF24;
      /* === 边框 === */
      --color-outline:          #475569;
      --color-outline-variant:  #334155;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.3);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.4);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.5);
      /* === 字体 === */
      --font-sans: "Space Grotesk", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="bg-surface sticky top-0 z-40 h-14 flex items-center border-b border-outline-variant/20">
    <div class="w-full max-w-7xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-primary/15 flex items-center justify-center">
          <i data-lucide="brain" class="text-primary w-4.5 h-4.5"></i>
        </div>
        <span class="font-bold text-lg tracking-tight">LogiReg Lab</span>
        <span class="text-xs text-on-surface-variant bg-surface-container px-2 py-0.5 rounded-full">互动教学</span>
      </div>
      <nav class="flex items-center gap-2">
        <a href="home.html" class="px-3 py-1.5 text-sm font-medium text-primary bg-primary/10 rounded-md" aria-current="page">实验场</a>
      </nav>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <!-- @main-content:start -->
  <main class="max-w-7xl mx-auto px-6 py-6">
    <!-- 子 Agent 填充页面业务内容 -->
  </main>
  <!-- @main-content:end -->

  <script>lucide.createIcons();</script>
</body>

</html>
